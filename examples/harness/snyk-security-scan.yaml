# Harness NG CI pipeline — mirror of .github/workflows/snyk-monitor.yml
#
# How to use:
#   1. In Harness: Account / Project → Secrets — create Text Secrets (identifiers below):
#        snyk_token   (value: Snyk API token)
#        snyk_org_id  (value: Snyk org ID or slug)
#   2. Create a Docker Registry connector that can pull public images from Docker Hub
#      (anonymous is fine). Put its identifier in connectorRef (often account.harnessImageConnector
#      on Harness Cloud — confirm in Connectors UI).
#   3. Adjust orgIdentifier / projectIdentifier to match your Harness scope.
#   4. Import this YAML in Pipeline Studio (YAML view) or wire the repo path in Input Sets.
#
# SARIF is left in the workspace root as snyk.sarif — add a separate “Upload Artifact”
# step in Harness if you want it stored in Harness artifact repo.
#
# Schema reference: https://developer.harness.io/docs/platform/pipelines/harness-yaml-quickstart

version: 1
pipeline:
  name: Snyk Security Scan
  identifier: snyk_security_scan
  orgIdentifier: default
  projectIdentifier: default
  stages:
    - stage:
        name: Snyk
        identifier: snyk
        description: Snyk OSS test, SARIF, Snyk Code --report, and snyk monitor
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: false
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: snyk_scans
                  identifier: snyk_scans
                  spec:
                    connectorRef: account.harnessImageConnector
                    image: node:20-bookworm
                    shell: Sh
                    envVariables:
                      SNYK_TOKEN: <+secrets.getValue("account.snyk_token")>
                      SNYK_ORG_ID: <+secrets.getValue("account.snyk_org_id")>
                    command: |-
                      set -euo pipefail
                      mkdir -p "$HOME/.local/bin"
                      curl -sL https://static.snyk.io/cli/latest/snyk-linux -o "$HOME/.local/bin/snyk"
                      chmod +x "$HOME/.local/bin/snyk"
                      export PATH="$HOME/.local/bin:$PATH"
                      snyk version
                      npm ci
                      REMOTE_URL="$(git config --get remote.origin.url)"
                      BRANCH_NAME="$(git rev-parse --abbrev-ref HEAD)"
                      REPO_BASENAME="$(basename "$REMOTE_URL")"
                      SNYK_PROJECT_NAME="${REPO_BASENAME%.git}"
                      set +e
                      snyk test \
                        --org="$SNYK_ORG_ID" \
                        --severity-threshold=high \
                        --sarif-file-output="$(pwd)/snyk.sarif"
                      SNYK_TEST_RC=$?
                      set -e
                      echo "Snyk OSS test exit code: ${SNYK_TEST_RC}"
                      set -u
                      set +e
                      snyk code test \
                        --org="$SNYK_ORG_ID" \
                        --report \
                        --project-name="$SNYK_PROJECT_NAME" \
                        --severity-threshold=high \
                        --target-reference="$BRANCH_NAME" \
                        --remote-repo-url="$REMOTE_URL"
                      code=$?
                      if [ "$code" -eq 1 ]; then
                        echo "Snyk Code finished with open issues (exit 1); results are in Snyk and logs above."
                        exit 0
                      fi
                      if [ "$code" -ne 0 ]; then
                        exit "$code"
                      fi
                      set -euo pipefail
                      snyk monitor \
                        --org="$SNYK_ORG_ID" \
                        --project-name="$SNYK_PROJECT_NAME" \
                        --remote-repo-url="$REMOTE_URL" \
                        --target-reference="$BRANCH_NAME"
