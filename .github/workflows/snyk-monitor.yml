---
name: Snyk Security Scan
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  snyk_monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Snyk CLI
        uses: snyk/actions/setup@master

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Snyk Test
        id: snyk_test
        continue-on-error: true
        run: snyk test --org=${{ secrets.SNYK_ORG_ID }} --severity-threshold=high --sarif-file-output=snyk.sarif
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload Snyk results to GitHub Code Scanning
        if: always() && steps.snyk_test.outcome != 'cancelled'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk.sarif

      - name: Run Snyk Monitor
        if: steps.snyk_test.outcome == 'success'
        run: snyk monitor --org=${{ secrets.SNYK_ORG_ID }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Fail if Snyk Test reported vulnerabilities
        if: steps.snyk_test.outcome == 'failure'
        run: exit 1
