---
name: Snyk Security Scan
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  snyk_monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Snyk CLI
        uses: snyk/actions/setup@master

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Snyk Test
        id: snyk_test
        continue-on-error: true
        run: snyk test --org=${{ secrets.SNYK_ORG_ID }} --severity-threshold=high --sarif-file-output=snyk.sarif
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload Snyk results to GitHub Code Scanning
        if: always() && steps.snyk_test.outcome != 'cancelled'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk.sarif

      - name: Run Snyk Code test (report to Snyk)
        id: snyk_code
        run: |
          set +e
          snyk code test \
            --org=${{ secrets.SNYK_ORG_ID }} \
            --report \
            --project-name=${{ github.event.repository.name }} \
            --severity-threshold=high \
            --target-reference=${{ github.ref_name }} \
            --remote-repo-url=${{ github.server_url }}/${{ github.repository }}
          code=$?
          # Exit 1 = issues found (still uploads with --report). Keep CI green unless you enforce a gate.
          if [ "$code" -eq 1 ]; then
            echo "Snyk Code finished with open issues (exit 1); results are in Snyk and logs above."
            exit 0
          fi
          exit "$code"
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk Monitor
        if: always() && steps.snyk_test.outcome != 'cancelled'
        run: >
          snyk monitor
          --org=${{ secrets.SNYK_ORG_ID }}
          --project-name=${{ github.event.repository.name }}
          --remote-repo-url=${{ github.server_url }}/${{ github.repository }}
          --target-reference=${{ github.ref_name }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      # OSS snyk test uses continue-on-error; snyk code maps exit 1 (findings) to 0 so the step stays green.
      # Re-add strict failure (remove mapping / use exit 1) when you want CI to block on Snyk Code issues.
